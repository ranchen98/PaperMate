<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperMate - AI Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>PaperMate</h2>
                <button id="btn-new-session" title="新建对话">+</button>
            </div>
            <ul id="session-list" class="session-list"></ul>
        </aside>

        <!-- 主聊天区 -->
        <main id="chat-area">
            <div id="chat-header">
                <span id="current-session-title">新对话</span>
                <button id="btn-delete-session" class="btn-danger" title="删除当前对话">删除对话</button>
            </div>
            <div id="messages-container"></div>
            <div id="input-area">
                <textarea id="msg-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
                <div class="input-actions">
                    <label class="stream-toggle">
                        <input type="checkbox" id="toggle-stream" checked>
                        <span>流式输出</span>
                    </label>
                    <button id="btn-send">发送</button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
