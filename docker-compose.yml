services:
  elasticsearch:
    build:
      context: ./infra
      dockerfile: es.Dockerfile
    image: papermate-elasticsearch:latest
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - ./resources/es:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: papermate-backend:latest
    env_file: .env
    environment:
      - ES_HOST=http://elasticsearch:9200
    volumes:
      - ./resources:/app/resources
    ports:
      - "8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: papermate-frontend:latest
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
