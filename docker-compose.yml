services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: papermate-backend:latest
    env_file: ${ENV_FILE:-.env}
    volumes:
      - ./resources:/app/resources
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      additional_contexts:
        root: .
    image: papermate-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
