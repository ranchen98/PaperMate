services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: papermate-backend:latest
    env_file: .env
    volumes:
      - ./resources:/app/resources
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: papermate-frontend:latest
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped