services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: papermate-backend:latest
    env_file: ${ENV_FILE:-.env}
    volumes:
      - ./resources:/app/resources
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      additional_contexts:
        root: .
    image: papermate-frontend:latest
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
